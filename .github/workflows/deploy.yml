name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'Code.gs'
      - 'appsscript.json'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Clasp
        run: npm install -g @google/clasp

      - name: Create clasprc.json
        run: |
          echo '${{ secrets.CLASP_TOKEN }}' > ~/.clasprc.json

      - name: Push to Google Apps Script
        run: clasp push -f

      - name: Deploy new version to existing Web App
        run: clasp deploy -i AKfycbw18-mYPD1Fg7AHCb6d5Fk-1AEstyNT0zxg-q3xTzY9i7F8hA_cgPYRsTTHlPeJ8plM8w -d "Auto deployment via GitHub Actions"
