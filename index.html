<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康數據紀錄趨勢圖</title>
    <!-- Pico.css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- LINE LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --spacing: 1rem; }
        body { padding: var(--spacing); }
        .container { max-width: 900px; }
        canvas { background: #fff; border-radius: 8px; padding: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .loading { text-align: center; padding: 2rem; }
        .filter-container { margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; }
        .filter-container select { margin-bottom: 0; flex: 1; }
        .filter-container label { margin-bottom: 0; white-space: nowrap; font-weight: bold; }
    </style>
</head>
<body>
    <main class="container">
        <hgroup>
            <h1>📊 健康數據監測系統</h1>
            <h2>歷史數據趨勢分析</h2>
        </hgroup>

        <!-- LINE 登入狀態區塊 -->
        <div id="auth-section" style="text-align: right; margin-bottom: 1rem;">
            <div id="user-profile" style="display: none; align-items: center; justify-content: flex-end; gap: 10px;">
                <img id="user-avatar" src="" alt="avatar" style="width: 32px; height: 32px; border-radius: 50%;">
                <span id="user-name" style="font-weight: bold;"></span>
                <button onclick="liff.logout(); window.location.reload();" style="width: auto; padding: 0.2rem 1rem; margin-bottom: 0;" class="secondary">登出</button>
            </div>
            <button id="login-btn" onclick="liff.login()" style="width: auto; padding: 0.2rem 1rem; display: none;">LINE 登入</button>
        </div>

        <div class="filter-container" id="filter-section" style="display: none; flex-direction: column; align-items: flex-start;">
            <div style="display: flex; flex-wrap: wrap; gap: 1rem; width: 100%;">
                <div style="flex: 1; min-width: 150px;">
                    <label for="petSelector">選擇對象：</label>
                    <select id="petSelector" onchange="filterChart()">
                        <!-- 動態生成選項 -->
                    </select>
                </div>
                <div style="flex: 1; min-width: 150px;">
                    <label for="startDate">開始日期：</label>
                    <input type="date" id="startDate" onchange="filterChart()">
                </div>
                <div style="flex: 1; min-width: 150px;">
                    <label for="endDate">結束日期：</label>
                    <input type="date" id="endDate" onchange="filterChart()">
                </div>
            </div>
        </div>

        <article id="chart-container">
            <div id="loader" class="loading">
                <p aria-busy="true">正在從 Notion 讀取數據...</p>
            </div>
            <canvas id="bgChart" style="display: none;"></canvas>
        </article>

        <footer style="margin-top: 2rem; text-align: center;">
            <small>資料來源：Notion Database | 由 Google Apps Script 強力驅動</small>
        </footer>
    </main>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbw18-mYPD1Fg7AHCb6d5Fk-1AEstyNT0zxg-q3xTzY9i7F8hA_cgPYRsTTHlPeJ8plM8w/exec';
        const LIFF_ID = '2010674644-4s2xYFvv'; // 已替換為您的 Dashboard LIFF ID
        
        let allData = [];
        let chartInstance = null;

        // 初始化日期選擇器 (預設最近 30 天，修正 UTC 時差問題)
        function initDateFilters() {
            const end = new Date();
            const start = new Date();
            start.setDate(end.getDate() - 30);
            
            // 格式化為在地日期 (YYYY-MM-DD)
            const toLocalDateString = (date) => {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            };
            
            document.getElementById('startDate').value = toLocalDateString(start);
            document.getElementById('endDate').value = toLocalDateString(end);
        }

        async function initApp() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    document.getElementById('login-btn').style.display = 'inline-block';
                    document.getElementById('loader').innerHTML = '<p>請先登入 LINE 以查看數據。</p>';
                } else {
                    const profile = await liff.getProfile();
                    document.getElementById('user-profile').style.display = 'flex';
                    document.getElementById('user-name').textContent = profile.displayName;
                    if(profile.pictureUrl) document.getElementById('user-avatar').src = profile.pictureUrl;
                    
                    initChart();
                }
            } catch (err) {
                console.error('LIFF init failed', err);
                document.getElementById('loader').innerHTML = '<p style="color: red;">LIFF 初始化失敗，請確認 LIFF ID 設定。</p>';
            }
        }

        async function initChart() {
            initDateFilters();
            try {
                const idToken = liff.getIDToken();
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: 'getDashboardData',
                        idToken: idToken
                    })
                });
                
                if (!response.ok) throw new Error('網路連線失敗');
                
                const result = await response.json();
                
                if (result.status === 'error') {
                    throw new Error(`驗證失敗: ${result.message}`);
                }
                
                allData = result.data;
                
                if (allData.length === 0) {
                    document.getElementById('loader').innerHTML = '<p>尚無紀錄數據。</p>';
                    return;
                }

                // 提取所有不重複的對象姓名
                const petNames = [...new Set(allData.map(item => item.pet))];
                const selector = document.getElementById('petSelector');
                
                // 清空並生成選項
                selector.innerHTML = petNames.map(name => `<option value="${name}">${name}</option>`).join('');
                
                // 顯示篩選區塊
                document.getElementById('filter-section').style.display = 'flex';

                // 初始繪圖
                filterChart();

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loader').innerHTML = `<p style="color: red;">讀取失敗: ${error.message}<br>請確認 GAS 已正確部署並開啟權限。</p>`;
            }
        }

        function filterChart() {
            const selectedPet = document.getElementById('petSelector').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            renderChart(selectedPet, start, end);
        }

        function renderChart(petName, startDate, endDate) {
            // 同時篩選對象與日期區間
            const filteredData = allData.filter(item => {
                const itemDate = item.time.split('T')[0];
                const matchesPet = item.pet === petName;
                const matchesDate = (!startDate || itemDate >= startDate) && (!endDate || itemDate <= endDate);
                return matchesPet && matchesDate;
            });

            if (filteredData.length === 0) {
                // 如果沒有數據，顯示提示並清空圖表
                if (chartInstance) chartInstance.destroy();
                document.getElementById('bgChart').style.display = 'none';
                document.getElementById('loader').style.display = 'block';
                document.getElementById('loader').innerHTML = '<p>該區間尚無數據。</p>';
                return;
            }

            const labels = filteredData.map(item => new Date(item.time).toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }));
            const values = filteredData.map(item => item.bg);
            const insulins = filteredData.map(item => item.insulin);
            const foods = filteredData.map(item => item.food);
            const notes = filteredData.map(item => item.note);

            document.getElementById('loader').style.display = 'none';
            const ctx = document.getElementById('bgChart');
            ctx.style.display = 'block';

            // 如果已有圖表，先銷毀
            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `${petName} 的血糖值 (mg/dL)`,
                        data: values,
                        borderColor: '#1DB446',
                        backgroundColor: 'rgba(29, 180, 70, 0.1)',
                        borderWidth: 3,
                        tension: 0.3,
                        fill: true,
                        pointRadius: 3,
                        pointHoverRadius: 6,
                        pointBackgroundColor: '#fff',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                afterBody: function(context) {
                                    const index = context[0].dataIndex;
                                    let extra = `胰島素: ${insulins[index]} U\n飲食量: ${foods[index]} g`;
                                    if (notes[index] && notes[index] !== "無") {
                                        extra += `\n備註: ${notes[index]}`;
                                    }
                                    return extra;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            title: { display: true, text: 'mg/dL' }
                        }
                    }
                }
            });
        }

        if (GAS_URL === 'YOUR_GAS_WEB_APP_URL') {
            document.getElementById('loader').innerHTML = '<p style="color: orange;">⚠️ 請先在 index.html 中設定 GAS_URL</p>';
        } else if (LIFF_ID === 'YOUR_LIFF_ID') {
            document.getElementById('loader').innerHTML = '<p style="color: orange;">⚠️ 請先在 index.html 中設定 LIFF_ID</p>';
        } else {
            initApp();
        }
    </script>
</body>
</html>
